<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- tailwind + daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Payoo | Home</title>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <dib class="left gap-1 flex">
                <div class="logo w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2 class="text-2xl font-bold">$ <span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </dib>

            <dib class="right">
                <a href="./index.html" class="btn btn-sopt"><i class="fa-solid fa-right-from-bracket"></i>LogOut</a>
            </dib>
        </section>
    </header>

    <section class="w-11/12 mx-auto py-10 space-y-4">
        <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
        <P class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </P>

        <div class="buttons grid grid-cols-3 gap-[16px]">
            <button onclick="showOnly('add-Money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button onclick="showOnly('cashout')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button onclick="showOnly('Transfer-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-3.png" alt="">
                <p>Transfer Money</p>
            </button>
            <button onclick="showOnly('Get-Bonus')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button onclick="showOnly('Transactions')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>

    <section id="add-Money" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold mb-5">Add Money</h2>
        <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Select A Bank</label>
                    <select id="add-Money-bank" class="select w-full bg-base-200 rounded-full">
                        <option disabled selected>Select bank</option>
                        <option value="DBBL">Dutch-Bangla Bank (DBBL)</option>
                        <option value="IBBL">Islami Bank Bangladesh (IBBL)</option>
                        <option value="City">City Bank</option>
                        <option>BRAC Bank</option>
                        <option>Eastern Bank Limited (EBL)</option>
                        <option>Standard Chartered Bank</option>
                        <option>HSBC Bank</option>
                        <option>Prime Bank</option>
                        <option>Bank Asia</option>
                        <option>Mutual Trust Bank (MTB)</option>
                        <option>United Commercial Bank (UCB)</option>
                        <option>National Bank</option>
                        <option>One Bank</option>
                        <option>Trust Bank</option>
                        <option>IFIC Bank</option>
                        <option>NRB Commercial Bank</option>
                        <option>NRB Bank</option>
                        <option>Mercantile Bank</option>
                        <option>Jamuna Bank</option>
                        <option>Social Islami Bank</option>
                        <option>Shahjalal Islami Bank</option>
                        <option>First Security Islami Bank</option>
                        <option>Al-Arafah Islami Bank</option>
                        <option>Meghna Bank</option>
                        <option>Midland Bank</option>
                        <option>Southeast Bank</option>
                        <option>Dhaka Bank</option>
                        <option>Premier Bank</option>
                        <option>Pubali Bank</option>
                        <option>Sonali Bank</option>
                        <option>Janata Bank</option>
                        <option>Agrani Bank</option>
                        <option>Rupali Bank</option>
                    </select>
                    <br>

                    <label class="label text-neutral font-bold">Bank Account Number</label>
                    <input id="add-Money-Numbar" maxlength="11" minlength="11" type="number"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter 11 digit account number" />
                    <br>
                    <label class="label text-neutral font-bold">Amount to Add</label>
                    <input id="add-Money-ammount" maxlength="11" minlength="11" type="number"
                        class="input rounded-full bg-base-200 w-full" placeholder="Add Amount to withdraw" />
                    <br>
                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="add-Money-Pin" type="password" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter 4 digit pin number" />
                    <!-- <div><a class="link link-hover">Forgot password?</a></div> -->
                    <button id="btn-add-money" class="btn btn-primary rounded-full mt-4">Add Money</button>
                </fieldset>
            </div>
        </div>
    </section>


    <section id="cashout" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold mb-5">Cash Out</h2>
        <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Agent Number</label>
                    <input id="cashout-numbar" maxlength="11" minlength="11" type="number"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter 11 digit number" />
                    <br>
                    <label class="label text-neutral font-bold">Amount</label>
                    <input id="amount-numbar" maxlength="11" minlength="11" type="number"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter amount to withdraw" />
                    <br>
                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="chshout-pin" type="password" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter 4 digit pin number" />
                    <!-- <div><a class="link link-hover">Forgot password?</a></div> -->
                    <button id="btn-cashout" class="btn btn-primary rounded-full mt-4">Withdraw Money</button>
                </fieldset>
            </div>
        </div>
    </section>

    <section id="Transfer-money" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold mb-5">Transfer Money</h2>
        <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">User Account Number</label>
                    <input id="transfer-numbar" maxlength="11" minlength="11" type="number"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter 11 digit number" />
                    <br>
                    <label class="label text-neutral font-bold">Amount</label>
                    <input id="tranasfer-amount-numbar" maxlength="11" minlength="11" type="number"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter amount to transfer" />
                    <br>
                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="transfer-pin" type="password" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter 4 digit pin number" />
                    <!-- <div><a class="link link-hover">Forgot password?</a></div> -->
                    <button id="btn-sent" class="btn btn-primary rounded-full mt-4">Send Now</button>
                </fieldset>
            </div>
        </div>

    </section>

    <section id="Get-Bonus" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold mb-5">Get Bonus</h2>
        <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Enter Bonus Coupon</label>
                    <input id="coupon" maxlength="11" minlength="11" type="number"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter your coupon" />
                    <br>
                    <button id="btn-coupon" class="btn btn-primary rounded-full mt-4">Get Bonus</button>
                </fieldset>
            </div>
        </div>
    </section>

    <section id="Pay-Bill" class="w-11/12 mx-auto py-5 ">
        <h2 class="text-xl font-bold mb-5">Pay Bill</h2>
            <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-neutral font-bold">Select To Pay</label>
                        <select id="pay-bill-list" class="select w-full bg-base-200 rounded-full">
                            <option disabled selected>Select Pay</option>
                            <option>Electricity Bill</option>
                            <option>Gas Bill</option>
                            <option>Water Bill</option>
                            <option>Internet Bill</option>
                            <option>Cable TV Bill</option>               
                            <option>Mobile Recharge</option>
                            <option>Postpaid Mobile Bill</option>
                                                    
                            <option>Credit Card Bill</option>
                            <option>Loan EMI</option>
                            <option>Insurance Premium</option>
                                                    
                            <option>School Fee</option>
                            <option>College Fee</option>
                            <option>Exam Fee</option>
                                                    
                            <option>Subscription Payment</option>
                            <option>Streaming Subscription</option>
                                                    
                            <option>Traffic Fine</option>
                            <option>Government Fee</option>
                                                    
                            <option>Donation</option>
                            <option>Event Ticket</option>
                            
                        </select>
                        <br>

                        <label class="label text-neutral font-bold">Biller Account Number </label>
                        <input id="bill-account-Numbar" maxlength="11" minlength="11" type="number"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter account number" />
                        <br>
                        <label class="label text-neutral font-bold">Amount to Pay</label>
                        <input id="add-pay-ammount" maxlength="11" minlength="11" type="number"
                            class="input rounded-full bg-base-200 w-full" placeholder="Add Amount to pay" />
                        <br>
                        <label class="label text-neutral font-bold">Pin Number</label>
                        <input id="pay-bill-Pin" type="password" class="input rounded-full bg-base-200 w-full"
                            placeholder="Enter 4 digit pin number" />
                        <button id="btn-pay-now" class="btn btn-primary rounded-full mt-4">Pay Now</button>
                    </fieldset>
                </div>
            </div>

        </section>


        <section id="Transactions" class="w-11/12 mx-auto py-5 ">
            <h2 class="text-xl font-bold mb-5">Transaction History</h2>
            <div class="space-y-5" id="History-container">

            </div>
        </section>
        <script src="./script/mashing.js"></script>
        <script src="./script/addmoney.js"></script>
        <script src="./script/cashout.js"></script>
        <script src="./script/transfer_money.js"></script>
</body>

</html>
